name: TraceClip CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # If Windows fails, let Ubuntu finish running so you can see all errors
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Caches dependencies to speed up the workflow
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e .
        
    # CRITICAL: Headless Linux servers don't have a UI or clipboard by default.
    # We install xclip and a virtual display (xvfb) so pyperclip doesn't instantly crash.
    - name: Setup Headless Display for Linux Clipboard
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xclip xvfb
        
    - name: Run Pytest (Linux)
      if: runner.os == 'Linux'
      # We use xvfb-run to simulate a screen for the clipboard
      run: xvfb-run pytest --cov=traceclip -v
      
    - name: Run Pytest (Windows & macOS)
      if: runner.os != 'Linux'
      run: pytest --cov=traceclip -v